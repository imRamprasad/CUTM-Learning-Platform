# Server Configuration
spring.application.name=platform
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/cutmlearning
spring.data.mongodb.auto-index-creation=true

# JWT Configuration
jwt.secret=MySecretKeyForJWTTokenGenerationAndValidation2024SecureKey
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Application Configuration
app.name=CUTM Learning Platform

# Logging
logging.level.com.cutm.platform=DEBUG
logging.level.org.springframework.security=DEBUG

