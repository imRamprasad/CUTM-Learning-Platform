# ================================================================================
# CUTM Learning Platform - Application Configuration
# ================================================================================
# Environment: Development
# Last Updated: March 11, 2026

# ================================================================================
# SERVER CONFIGURATION
# ================================================================================
server.port=8080
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-stacktrace=on_param
server.compression.enabled=true
server.compression.min-response-size=1024

# ================================================================================
# MONGODB CONFIGURATION
# ================================================================================
spring.data.mongodb.uri=mongodb://localhost:27017/cutm_learning_platform
spring.data.mongodb.auto-index-creation=true

# ================================================================================
# SECURITY CONFIGURATION
# ================================================================================
# JWT Settings
app.jwt.secret=your-secret-key-min-256-bits-change-in-production-environment-security
app.jwt.expiration=43200000
app.jwt.refresh.expiration=604800000

# ================================================================================
# SPRING SECURITY CONFIGURATION
# ================================================================================
spring.security.user.name=admin
spring.security.user.password=admin

# ================================================================================
# LOGGING CONFIGURATION
# ================================================================================
logging.level.root=INFO
logging.level.com.cutm.platform=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ================================================================================
# JSON SERIALIZATION
# ================================================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# ================================================================================
# CORS CONFIGURATION
# ================================================================================
# Handled in SecurityConfig.java
cors.allowed-origins=http://localhost:3000,http://localhost:3001
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# ================================================================================
# FILE UPLOAD CONFIGURATION
# ================================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================================================================
# ACTUATOR CONFIGURATION (Health Checks)
# ================================================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.mongodb.enabled=true

# ================================================================================
# DATABASE INITIALIZATION
# ================================================================================
# Set to true to create indexes on startup

